<dialog #dialogRef class="modal">
  <div class="modal-box border border-base-300 bg-base-100 shadow-xl">
    <div class="mb-4 flex size-12 items-center justify-center rounded-full bg-error/10 text-error">
      !
    </div>
    <h3 class="text-xl font-bold">{{ message }}</h3>
    <p class="py-2 text-base-content/60">This action cannot be undone.</p>
    <div class="modal-action">
      <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
      <button type="button" class="btn btn-error" (click)="confirm()">Confirm</button>
    </div>
  </div>
</dialog>
