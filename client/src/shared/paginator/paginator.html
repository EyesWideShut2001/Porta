<div class="flex flex-wrap items-center justify-end gap-2 py-2 text-sm text-base-content/70">
  <label for="page-size">Per page</label>
  <select
    id="page-size"
    class="select select-sm w-20 bg-base-100"
    (change)="onPageChange(undefined, $event.target)"
  >
    @for (size of pageSizeOptions(); track $index) {
      <option [value]="size" [selected]="size === pageSize()">{{ size }}</option>
    }
  </select>
  <div class="min-w-24 text-center text-xs font-medium">
    {{ (pageNumber() - 1) * pageSize() + 1 }} - {{ lastItemIndex() }} of {{ totalCount() }}
  </div>

  <div class="join">
    <button
      type="button"
      class="btn btn-ghost btn-sm join-item"
      [disabled]="pageNumber() === 1"
      (click)="onPageChange(pageNumber() - 1)"
      aria-label="Previous page"
    >
      &larr;
    </button>
    <button
      type="button"
      class="btn btn-ghost btn-sm join-item"
      [disabled]="pageNumber() >= totalPages()"
      (click)="onPageChange(pageNumber() + 1)"
      aria-label="Next page"
    >
      &rarr;
    </button>
  </div>
</div>
