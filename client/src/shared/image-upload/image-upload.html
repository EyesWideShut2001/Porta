<div class="grid w-full gap-4 md:grid-cols-[1fr_220px]">
  <div class="flex min-h-64 items-center">
    <label
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
      [class.border-primary]="isDragging"
      [class.bg-primary/5]="isDragging"
      for="dropzone-file"
      class="flex h-full w-full flex-col items-center justify-center rounded-lg border border-dashed border-base-300 bg-base-200/60 px-6 py-10 text-center transition-colors"
      [class.cursor-pointer]="!disabled()"
      [class.opacity-50]="disabled()"
    >
      <div class="mb-3 rounded-full bg-base-100 p-4">
        <span class="text-2xl">+</span>
      </div>
      <p class="font-medium">Click to upload or drag and drop</p>
      <p class="mt-1 text-sm text-base-content/60">Image files, including JPEG, PNG, and WebP</p>
      <input
        (change)="onFileSelected($event)"
        type="file"
        id="dropzone-file"
        accept="image/*"
        class="hidden"
        [disabled]="disabled()"
      />
    </label>
  </div>

  @if (imageSrc()) {
    <div class="flex flex-col gap-3">
      <div class="overflow-hidden rounded-lg border border-base-300 bg-base-200">
        <img
          src="{{ imageSrc() }}"
          alt="image preview"
          class="aspect-square w-full object-cover"
        />
      </div>
      <div class="grid grid-cols-2 gap-2">
        <button (click)="onCancel()" class="btn flex-1">Cancel</button>
        <button
          (click)="onUploadFile()"
          class="btn btn-primary flex-1"
          [disabled]="loading() || disabled()"
        >
          @if (loading()) {
            <span class="loading loading-spinner"></span>
          }
          {{ actionLabel() }}
        </button>
      </div>
    </div>
  }
</div>
