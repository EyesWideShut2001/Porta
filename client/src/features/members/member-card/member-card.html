@if (member(); as member) {
  <article
    routerLink="/members/{{ member.id }}"
    class="group card card-border relative cursor-pointer overflow-hidden bg-base-100 shadow-sm transition duration-300 hover:-translate-y-1 hover:shadow-xl"
  >
    <img
      [src]="member.imageUrl || '/user.png'"
      alt="{{ member.displayName }} profile"
      class="aspect-square w-full object-cover transition duration-500 group-hover:scale-105"
    />

    @if (isOnline()) {
      <span
        class="status status-success status-lg absolute left-3 top-3 ring-4 ring-base-100/70"
        aria-label="Online"
      ></span>
    }

    <button
      type="button"
      (click)="toggleLike($event)"
      class="btn btn-circle btn-ghost btn-sm absolute right-2 top-2 z-40 bg-base-100/80 text-error shadow-sm backdrop-blur-sm"
      [attr.aria-label]="hasLiked() ? 'Remove like' : 'Like member'"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        [attr.fill]="hasLiked() ? 'currentColor' : 'none'"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-6"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"
        />
      </svg>
    </button>

    <div
      class="absolute inset-x-0 bottom-0 bg-linear-to-t from-neutral via-neutral/80 to-transparent px-4 pb-3 pt-12 text-neutral-content"
    >
      <div class="text-lg font-semibold leading-tight">
        {{ member.displayName }}, {{ member.dateOfBirth | age }}
      </div>
      <div class="mt-1 text-sm opacity-80">{{ member.city }}</div>
    </div>
  </article>
}
