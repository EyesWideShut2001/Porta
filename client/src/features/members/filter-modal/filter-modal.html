<dialog #filterModal class="modal">
  <div class="modal-box max-w-xl border border-base-300 bg-base-100 shadow-xl">
    <h3 class="text-2xl font-bold">Refine your matches</h3>
    <p class="mt-1 text-sm text-base-content/60">Adjust the results to match your preferences.</p>

    <div class="mt-7 flex w-full flex-col gap-6">
      <label class="grid items-center gap-3 sm:grid-cols-[1fr_auto]">
        <span class="font-semibold">Gender</span>
        <form class="filter">
          <input type="reset" value="All" class="btn" aria-label="All genders" />
          <input
            type="radio"
            class="btn"
            [(ngModel)]="memberParams().gender"
            aria-label="Male"
            name="gender"
            value="male"
          />
          <input
            type="radio"
            class="btn"
            [(ngModel)]="memberParams().gender"
            aria-label="Female"
            name="gender"
            value="female"
          />
        </form>
      </label>

      <label class="grid items-center gap-3 sm:grid-cols-[1fr_auto]">
        <span class="font-semibold">Age range</span>
        <div class="flex gap-3">
          <input
            type="number"
            class="input w-24"
            [min]="18"
            [(ngModel)]="memberParams().minAge"
            name="minAge"
            (change)="onMinAgeChange()"
            aria-label="Minimum age"
          />
          <input
            type="number"
            class="input w-24"
            [min]="memberParams().minAge || 18"
            [(ngModel)]="memberParams().maxAge"
            name="maxAge"
            (change)="onMaxAgeChange()"
            aria-label="Maximum age"
          />
        </div>
      </label>

      <label class="grid items-center gap-3 sm:grid-cols-[1fr_auto]">
        <span class="font-semibold">Order by</span>
        <select
          name="orderBy"
          class="select min-w-52"
          [(ngModel)]="memberParams().orderBy"
        >
          <option disabled>Order by</option>
          <option value="created">Newest members</option>
          <option value="lastActive">Last active</option>
        </select>
      </label>
    </div>

    <div class="modal-action">
      <button type="button" (click)="close()" class="btn btn-ghost">Cancel</button>
      <button type="button" (click)="submit()" class="btn btn-primary">Apply filters</button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button (click)="close()">Close</button>
  </form>
</dialog>
