<div class="card card-border h-full min-h-0 overflow-hidden bg-base-100 shadow-sm">
  <div class="min-h-0 flex-1 overflow-auto">
    <table class="table table-zebra table-pin-rows">
      <thead>
        <tr>
          <th class="bg-base-100">Email</th>
          <th class="bg-base-100">Active roles</th>
          <th class="bg-base-100 text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (user of users(); track user.id) {
          <tr>
            <td class="font-medium">{{ user.email }}</td>
            <td class="text-base-content/70">{{ user.roles }}</td>
            <td class="text-right">
              <button
                type="button"
                (click)="openRolesModal(user)"
                class="btn btn-primary btn-sm"
              >
                Edit roles
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="py-16 text-center text-base-content/60">No users found.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<dialog #rolesModal class="modal">
  <div class="modal-box border border-base-300 bg-base-100 shadow-xl">
    <h3 class="text-xl font-bold">Edit user roles</h3>
    <p class="mt-1 truncate text-sm text-base-content/60">{{ selectedUser?.email }}</p>

    <fieldset class="fieldset mt-6 w-full rounded-box border border-base-300 bg-base-200 p-4">
      <legend class="fieldset-legend">Selected roles</legend>
      @for (role of availableRoles; track role) {
        <label class="fieldset-label rounded-box px-2 py-2 hover:bg-base-100">
          <input
            (change)="toggleRole($event, role)"
            type="checkbox"
            [checked]="selectedUser?.roles?.includes(role)"
            class="checkbox checkbox-primary"
            [disabled]="selectedUser?.email === 'admin@test.com' && role === 'Admin'"
          />
          {{ role }}
        </label>
      }
    </fieldset>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-ghost">Cancel</button>
      </form>
      <button type="button" (click)="updateRoles()" class="btn btn-primary">Save roles</button>
    </div>
  </div>

  <form method="dialog" class="modal-backdrop">
    <button>Close</button>
  </form>
</dialog>
