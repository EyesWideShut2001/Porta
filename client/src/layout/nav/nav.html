<header
  class="navbar fixed top-0 z-50 w-full bg-primary px-4 text-primary-content shadow-lg transition-colors duration-300 lg:px-10"
>
  <div class="navbar-start w-auto shrink-0">
    <a
      [routerLink]="homeLink()"
      class="btn btn-ghost gap-3 px-2 text-xl font-semibold"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="currentColor"
        class="size-7"
      >
        <path
          d="M4.5 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM14.25 8.625a3.375 3.375 0 1 1 6.75 0 3.375 3.375 0 0 1-6.75 0ZM1.5 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM17.25 19.128l-.001.144a2.25 2.25 0 0 1-.233.96 10.088 10.088 0 0 0 5.06-1.01.75.75 0 0 0 .42-.643 4.875 4.875 0 0 0-6.957-4.611 8.586 8.586 0 0 1 1.71 5.157v.003Z"
        />
      </svg>
      <span>Porta</span>
    </a>
  </div>

  @if (accountService.currentUser()) {
    <nav class="navbar-center ml-4 hidden lg:flex">
      <ul class="menu menu-horizontal gap-1 px-1 text-sm font-semibold uppercase">
        <li>
          <a
            routerLink="/members"
            routerLinkActive="bg-primary-content text-primary"
            [routerLinkActiveOptions]="{ exact: true }"
            >Matches</a
          >
        </li>
        <li>
          <a routerLink="/messages" routerLinkActive="bg-primary-content text-primary"
            >Messages</a
          >
        </li>
        <li>
          <a routerLink="/lists" routerLinkActive="bg-primary-content text-primary">Lists</a>
        </li>
        <li *appHasRole="['Admin', 'Moderator']">
          <a routerLink="/admin" routerLinkActive="bg-primary-content text-primary">Admin</a>
        </li>
      </ul>
    </nav>
  }

  <div class="navbar-end ml-auto gap-2">
    @if (busyService.busyRequestCount() > 0) {
      <span class="loading loading-spinner text-primary-content"></span>
    }

    @if (accountService.currentUser(); as user) {
      <div class="dropdown dropdown-end z-[60]">
        <button
          type="button"
          tabindex="0"
          class="btn btn-ghost h-auto gap-3 px-2 py-1 text-primary-content"
        >
          <img
            [src]="user.imageUrl || '/user.png'"
            alt="user avatar"
            class="size-10 rounded-full object-cover ring-2 ring-primary-content/60"
          />
          <span class="hidden text-base font-medium xl:inline">{{ user.displayName }}</span>
        </button>
        <ul
          (click)="handleSelectUserItem()"
          tabindex="-1"
          class="dropdown-content menu z-[60] mt-3 w-52 rounded-box bg-base-100 p-2 text-base-content shadow-xl"
        >
          <li><a routerLink="/members/{{ user.id }}">Edit profile</a></li>
          <li><button type="button" (click)="logout()">Logout</button></li>
        </ul>
      </div>
    } @else {
      <form #loginForm="ngForm" (ngSubmit)="login()" class="flex items-center gap-2">
        <input
          [(ngModel)]="creds.email"
          name="email"
          type="text"
          class="input input-sm w-36 bg-base-100 text-base-content xl:w-44"
          placeholder="Email"
        />
        <input
          [(ngModel)]="creds.password"
          name="password"
          type="password"
          class="input input-sm w-36 bg-base-100 text-base-content xl:w-44"
          placeholder="Password"
        />
        <button type="submit" class="btn btn-secondary btn-sm">
          @if (loading()) {
            <span class="loading loading-spinner"></span>
          }
          Login
        </button>
      </form>
    }

    <div
      class="dropdown dropdown-end z-40"
      [class.dropdown-open]="themeMenuOpen()"
      (click)="$event.stopPropagation()"
    >
      <button
        type="button"
        (click)="toggleThemeMenu($event)"
        class="btn btn-ghost btn-sm h-auto gap-2 py-1 uppercase"
        aria-label="Select application theme"
        [attr.aria-expanded]="themeMenuOpen()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9.53 16.122a3 3 0 0 0-5.78 1.128 2.25 2.25 0 0 1-2.4 2.245 4.5 4.5 0 0 0 8.4-2.245c0-.399-.078-.78-.22-1.128Zm0 0a15.998 15.998 0 0 0 3.388-1.62m-5.043-.025a15.994 15.994 0 0 1 1.622-3.395m3.42 3.42a15.995 15.995 0 0 0 4.764-4.648l3.876-5.814a1.151 1.151 0 0 0-1.597-1.597L14.146 6.32a15.996 15.996 0 0 0-4.649 4.763m3.42 3.42a6.776 6.776 0 0 0-3.42-3.42"
          />
        </svg>
        <span class="hidden capitalize xl:inline">{{ selectedThemeLabel() }}</span>
      </button>

      @if (themeMenuOpen()) {
        <ul
          class="dropdown-content menu menu-sm z-40 mt-3 grid w-[calc(100vw-2rem)] max-w-xl grid-cols-3 gap-1 rounded-box bg-base-100 p-2 text-base-content shadow-xl sm:gap-2 lg:grid-cols-5"
        >
          @for (theme of themes; track theme.value) {
            <li>
              <button
                type="button"
                (click)="handleSelectedTheme(theme.value)"
                [class.menu-active]="selectedTheme() === theme.value"
                class="min-w-0 flex-col items-stretch gap-1 px-2 py-1.5 text-left capitalize"
              >
                <span class="truncate">{{ theme.label }}</span>
                <span
                  [attr.data-theme]="theme.value"
                  class="grid grid-cols-3 overflow-hidden rounded-box shadow-sm"
                  aria-hidden="true"
                >
                  <span class="h-2 bg-primary"></span>
                  <span class="h-2 bg-secondary"></span>
                  <span class="h-2 bg-accent"></span>
                </span>
              </button>
            </li>
          }
        </ul>
      }
    </div>
  </div>
</header>
